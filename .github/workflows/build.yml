
name: Build Vibe Music IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SCHEME: VibeMusic

jobs:
  build:
    runs-on: macos-14
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          curl -L https://github.com/yonaskolb/XcodeGen/releases/download/2.41.0/xcodegen.zip -o xcodegen.zip
          unzip -q xcodegen.zip
          BIN=$(find . -name "xcodegen" -type f | head -1)
          chmod +x "$BIN"
          sudo cp "$BIN" /usr/local/bin/xcodegen
          xcodegen version

      - name: Create Secrets.xcconfig
        env:
          GID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GUS: ${{ secrets.GOOGLE_URL_SCHEME }}
          YT:  ${{ secrets.YOUTUBE_API_KEY }}
          RA:  ${{ secrets.RAPID_API_KEY }}
        run: |
          cat > Secrets.xcconfig << 'XCCONFIG_EOF'
          GOOGLE_CLIENT_ID = ${GID}
          GOOGLE_URL_SCHEME = ${GUS}
          YOUTUBE_API_KEY = ${YT}
          RAPID_API_KEY = ${RA}
          XCCONFIG_EOF

          echo "=== Secrets.xcconfig created ==="
          echo "GOOGLE_CLIENT_ID  = $( [ -n "$GID" ] && echo 'SET' || echo 'EMPTY' )"
          echo "GOOGLE_URL_SCHEME = $( [ -n "$GUS" ] && echo 'SET' || echo 'EMPTY' )"
          echo "YOUTUBE_API_KEY   = $( [ -n "$YT" ]  && echo 'SET' || echo 'EMPTY' )"
          echo "RAPID_API_KEY     = $( [ -n "$RA" ]  && echo 'SET' || echo 'EMPTY' )"
          echo "=================================="
          cat Secrets.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -project VibeMusic.xcodeproj -scheme $SCHEME

      - name: Build IPA
        env:
          GID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GUS: ${{ secrets.GOOGLE_URL_SCHEME }}
          YT:  ${{ secrets.YOUTUBE_API_KEY }}
          RA:  ${{ secrets.RAPID_API_KEY }}
        run: |
          xcodebuild build \
            -project VibeMusic.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            GOOGLE_CLIENT_ID="$GID" \
            GOOGLE_URL_SCHEME="$GUS" \
            YOUTUBE_API_KEY="$YT" \
            RAPID_API_KEY="$RA" \
            | tee build.log

          echo ""
          echo "=== Build Result ==="
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "BUILD SUCCEEDED"
          else
            echo "BUILD FAILED"
            tail -50 build.log
            exit 1
          fi

      - name: Verify API key in built app
        run: |
          APP=$(find DerivedData -name "VibeMusic.app" -type d | head -1)
          echo "App path: $APP"
          PLIST="$APP/Info.plist"
          if [ -f "$PLIST" ]; then
            echo "--- YOUTUBE_API_KEY in Info.plist ---"
            /usr/libexec/PlistBuddy -c "Print :YOUTUBE_API_KEY" "$PLIST" 2>/dev/null || echo "NOT FOUND"
            echo "--- RAPID_API_KEY in Info.plist ---"
            /usr/libexec/PlistBuddy -c "Print :RAPID_API_KEY" "$PLIST" 2>/dev/null || echo "NOT FOUND"
          else
            echo "Info.plist not found at $PLIST"
          fi

      - name: Package IPA
        run: |
          APP=$(find DerivedData -name "VibeMusic.app" -type d | head -1)
          echo "Packaging: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/VibeMusic.app
          zip -qr VibeMusic.ipa Payload
          ls -lh VibeMusic.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VibeMusic-${{ github.run_number }}
          path: VibeMusic.ipa
          retention-days: 30
