name: Build Vibe Music IPA

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

env:
  SCHEME: VibeMusic
  BUNDLE_ID: com.vibe.music

jobs:
  build:
    name: Build IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen 2.41.0
        run: |
          curl -L https://github.com/yonaskolb/XcodeGen/releases/download/2.41.0/xcodegen.zip -o xcodegen.zip
          unzip -q xcodegen.zip
          XCODEGEN_BIN=$(find . -name "xcodegen" -type f | head -1)
          chmod +x "$XCODEGEN_BIN"
          sudo cp "$XCODEGEN_BIN" /usr/local/bin/xcodegen
          xcodegen version

      - name: Write xcconfig with secrets
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_URL_SCHEME: ${{ secrets.GOOGLE_URL_SCHEME }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: |
          echo "GOOGLE_CLIENT_ID = ${GOOGLE_CLIENT_ID}" > Secrets.xcconfig
          echo "GOOGLE_URL_SCHEME = ${GOOGLE_URL_SCHEME}" >> Secrets.xcconfig
          echo "YOUTUBE_API_KEY = ${YOUTUBE_API_KEY}" >> Secrets.xcconfig
          echo "RAPID_API_KEY = ${RAPID_API_KEY}" >> Secrets.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project VibeMusic.xcodeproj -scheme $SCHEME

      - name: Build unsigned .app
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_URL_SCHEME: ${{ secrets.GOOGLE_URL_SCHEME }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: |
          BUILD_DIR=$(pwd)/build

          xcodebuild build \
            -project VibeMusic.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR="$BUILD_DIR" \
            SYMROOT="$BUILD_DIR" \
            OBJROOT="$BUILD_DIR/Intermediates" \
            GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
            GOOGLE_URL_SCHEME="${GOOGLE_URL_SCHEME}" \
            YOUTUBE_API_KEY="${YOUTUBE_API_KEY}" \
            RAPID_API_KEY="${RAPID_API_KEY}" \
            | xcpretty --color --simple

          echo "--- Build directory ---"
          find "$BUILD_DIR" -name "*.app" -type d | head -10

      - name: Package IPA
        run: |
          BUILD_DIR=$(pwd)/build
          APP_PATH=$(find "$BUILD_DIR" -name "VibeMusic.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found:"
            find "$BUILD_DIR" -maxdepth 4 | head -40
            exit 1
          fi

          echo "Found .app at: $APP_PATH"
          ls -la "$APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr VibeMusic.ipa Payload
          ls -lh VibeMusic.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VibeMusic-${{ github.run_number }}
          path: VibeMusic.ipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: VibeMusic.ipa
          generate_release_notes: true
          name: Vibe Music ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Build failed notification
        run: echo "::error::Build failed! ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
